    * { box-sizing: border-box; }

    }
    header {

      align-items: flex-end;

    .search input {
      width: 100%;
      padding: 11px 12px 11px 36px;
      border-radius: 12px;
      border: 1px solid var(--border);
      outline: none;
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-size: 14px;
    }
    .search .icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); opacity: .8; font-size: 14px;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.05);
      color: var(--muted); font-size: 13px; user-select: none;
    }
    .table-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,.03);
      box-shadow: 0 16px 50px rgba(0,0,0,.35);
    }
    .scroll { overflow: auto; -webkit-overflow-scrolling: touch; }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed; /* key for alignment */
    }
    col.c1 { width: 120px; }
    col.c2 { width: 220px; }
    col.c3 { width: 110px; }
    col.c4 { width: 220px; }
    col.c5 { width: 220px; }
    col.c6 { width: 320px; }
    col.c7 { width: 140px; }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(10,14,26,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      text-align: left;
      padding: 12px 12px;
      white-space: nowrap;
      z-index: 2;
    }
    tbody td {
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 12px 12px;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    tbody tr:hover { background: rgba(255,255,255,.04); }

    /* Sticky first column: remove padding on the sticky cell itself to avoid width drift;
       put padding inside .pad to keep exact column boundaries aligned with header */
    th.sticky-first, td.sticky-first {
      position: sticky;
      left: 0;
      padding: 0;              /* important */
      background: rgba(255,255,255,.02);
      backdrop-filter: blur(8px);
      border-right: 1px solid rgba(255,255,255,.08);
      z-index: 3;
    }
    th.sticky-first { z-index: 4; background: rgba(10,14,26,.92); }
    .pad { padding: 12px 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .school { font-weight: 650; color: var(--text); }
    .sex { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; }
    .click-left { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 8px 10px; border-radius: 12px;
      border: 1px solid rgba(125,211,252,.35);
      background: rgba(125,211,252,.08);
      color: var(--accent);
      text-decoration: none; font-weight: 650; white-space: nowrap;
    }
    .btn:hover { background: rgba(125,211,252,.14); }
    .muted { color: var(--muted); font-size: 12px; }

    @media (max-width: 860px) {
      thead th { position: static; }
      th.sticky-first, td.sticky-first { position: static; border-right: none; padding: 12px 12px; }
      .pad { padding: 0; }
    }
  </style>

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function rowMatches(row, q){
  if(!q) return true;
  const hay = [
    row["区域"], row["学校"], row["男/女校"],
    row["申请日期"], row["申请方式"], row["入学考试"]
  ].join(" ").toLowerCase();
  return hay.includes(q);
}

function openUrl(url) {
  if(!url) return;
  window.open(url, "_blank", "noopener,noreferrer");
}

function render(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";
  const filtered = DATA.filter(r => rowMatches(r, q));
  document.getElementById("count").textContent = String(filtered.length);

  for(const r of filtered){
    const tr = document.createElement("tr");
    tr.dataset.url = r["链接"] || "";

    tr.addEventListener("click", (e) => {
      const a = e.target.closest("a");
      if(a) return;
      openUrl(tr.dataset.url);
    });

    tr.innerHTML = `
      <td class="sticky-first">
        <div class="pad click-left" title="点击打开外链">
          <span style="opacity:.85">↗</span>
          <span>${escapeHtml(r["区域"])}</span>
        </div>
      </td>
      <td>
        <div class="school click-left" title="点击打开外链">${escapeHtml(r["学校"])}</div>
      </td>
      <td><span class="sex">👥 ${escapeHtml(r["男/女校"])}</span></td>
      <td>${escapeHtml(r["申请日期"])}</td>
      <td>${escapeHtml(r["申请方式"])}</td>
      <td>${escapeHtml(r["入学考试"])}</td>
      <td>
        ${r["链接"] ? `
          <a class="btn" href="${escapeHtml(r["链接"])}" target="_blank" rel="noopener noreferrer">
            点击进入 🔗
          </a>
        ` : `<span class="muted">无</span>`}
      </td>
    `;

    tr.querySelectorAll(".click-left").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        openUrl(tr.dataset.url);
      });
    });

    tbody.appendChild(tr);
  }
}

document.getElementById("q").addEventListener("input", render);
render();
</script>
